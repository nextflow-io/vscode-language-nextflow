<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Seqera Dark preview</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0b0812; padding: 0; }
    .workbench { display: grid; grid-template-columns: 48px 200px 1fr; height: 420px; font-family: "JetBrains Mono", monospace; }
    .activity { background: #160f26; border-right: 1px solid #2a2236; display: flex; flex-direction: column; align-items: center; gap: 16px; padding-top: 14px; color: #0dc09d; font-size: 15px; }
    .sidebar { background: #160f26; border-right: 1px solid #2a2236; color: #dddede; padding: 14px 10px; font-size: 12px; font-family: Inter, system-ui, sans-serif; }
    .item { padding: 4px 6px; border-radius: 4px; margin-bottom: 2px; display: flex; gap: 6px; align-items: center; }
    .item.active { background: #0dc09d44; color: #f5f5f5; }
    .item.indent { padding-left: 20px; }
    .dot { width: 8px; height: 8px; border-radius: 2px; background: #0dc09d; flex-shrink: 0; }
    .editor { background: #1e1829; color: #f5f5f5; font-size: 13px; line-height: 1.6; padding: 16px 18px; }
    .kw { color: #0dc09d; font-weight: 600; }
    .fn { color: #86e0ce; font-weight: 600; }
    .str { color: #b6ece2; }
    .cm { color: #545555; font-style: italic; }
    .tabbar { background: #160f26; border-bottom: 1px solid #2a2236; padding: 8px 12px 0; display: flex; gap: 2px; font-family: Inter, system-ui, sans-serif; font-size: 12px; }
    .tab { padding: 7px 14px; border-radius: 6px 6px 0 0; color: #babcbd; }
    .tab.active { background: #1e1829; color: #f5f5f5; border-top: 2px solid #0dc09d; }
  </style>
</head>
<body>
  <div class="tabbar">
    <div class="tab active">main.nf</div>
    <div class="tab">nextflow.config</div>
  </div>
  <div class="workbench">
    <div class="activity"><span>📁</span><span>🔍</span><span>⎇</span><span>▶</span></div>
    <div class="sidebar">
      <div class="item active"><span class="dot"></span> main.nf</div>
      <div class="item indent"><span class="dot"></span> modules/foo.nf</div>
      <div class="item"><span class="dot"></span> nextflow.config</div>
    </div>
    <div class="editor"><span class="cm">// RNA-seq pipeline</span>
<span class="kw">workflow</span> {
    <span class="fn">RNASEQ</span>(reads_ch)
}

<span class="kw">process</span> <span class="fn">RNASEQ</span> {
    <span class="kw">input</span>:
    path reads

    <span class="kw">output</span>:
    path <span class="str">'*.bam'</span>

    <span class="kw">script</span>:
    <span class="str">"""
    salmon -o out
    """</span>
}</div>
  </div>
</body>
</html>
