<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Seqera File Icon Theme — Preview</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; background: #1e1829; color: #f5f5f5; padding: 32px; }
    h1 { font-size: 1.25rem; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 720px; }
    .panel { background: #160f26; border: 1px solid #2a2236; border-radius: 10px; padding: 16px; }
    .panel.light { background: #f5f5f7; color: #160f26; border-color: #dddede; }
    .panel h2 { font-size: .85rem; margin-bottom: 12px; opacity: .8; }
    .row { display: flex; align-items: center; gap: 10px; padding: 6px 4px; font-size: 13px; }
    .row img { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <h1>Seqera File Icon Theme</h1>
  <div class="grid">
    <div class="panel">
      <h2>Dark UI</h2>
      <div class="row"><img src="icons/folder-dark.svg" alt="" /> modules/</div>
      <div class="row"><img src="icons/nextflow-script-dark.svg" alt="" /> main.nf</div>
      <div class="row"><img src="icons/nextflow-script-dark.svg" alt="" /> nextflow.config</div>
      <div class="row"><img src="icons/nextflow-log-dark.svg" alt="" /> .nextflow.log</div>
      <div class="row"><img src="icons/document-dark.svg" alt="" /> README.md</div>
    </div>
    <div class="panel light">
      <h2>Light UI</h2>
      <div class="row"><img src="icons/folder-light.svg" alt="" /> modules/</div>
      <div class="row"><img src="icons/nextflow-script-light.svg" alt="" /> main.nf</div>
      <div class="row"><img src="icons/nextflow-script-light.svg" alt="" /> nextflow.config</div>
      <div class="row"><img src="icons/nextflow-log-light.svg" alt="" /> .nextflow.log</div>
      <div class="row"><img src="icons/document-light.svg" alt="" /> README.md</div>
    </div>
  </div>
</body>
</html>
